<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVPhotography | Modern Photography Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth modal transitions */
        #passwordModal { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #passwordModal.active { opacity: 1; pointer-events: auto; }
        
        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toast Notification */
        #toast {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #toast.show { transform: translateY(0); }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-gray-100 shadow-sm">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" class="text-2xl md:text-3xl font-bold tracking-tighter text-gray-950">
                AVPhotography<span class="text-indigo-600">.</span>
            </a>
            <button id="openUploadBtn" class="bg-gray-950 hover:bg-indigo-600 text-white font-medium px-5 py-2.5 rounded-full text-sm flex items-center gap-2 transition-all duration-300 shadow-sm hover:shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Upload
            </button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 md:py-16 flex-grow w-full">
        <div class="mb-12 border-b border-gray-200 pb-8">
            <h1 class="text-4xl font-extrabold tracking-tighter text-gray-950 md:text-5xl">Featured Works</h1>
            <p class="mt-3 text-gray-500 max-w-2xl text-lg">A curated collection of moments captured through the lens.</p>
        </div>
        
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8">
            <p id="emptyState" class="text-gray-400 col-span-full text-center py-12 hidden">No photos uploaded yet. Be the first!</p>
        </div>
    </main>

    <footer class="border-t border-gray-200 bg-white mt-auto">
        <div class="max-w-7xl mx-auto px-6 py-8 text-center text-sm text-gray-400">
            &copy; 2024 AVPhotography. All rights reserved.
        </div>
    </footer>

    <div id="passwordModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 transform transition-all">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modalTitle" class="text-2xl font-bold tracking-tight text-gray-950">Admin Access</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-800 transition-colors p-2 rounded-full hover:bg-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div id="passwordStep" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Passcode</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <p id="passwordError" class="text-red-500 text-sm font-medium hidden">Incorrect password. Please try again.</p>
                <button id="submitPasswordBtn" class="w-full bg-gray-950 hover:bg-indigo-600 text-white font-semibold py-3.5 rounded-xl transition-colors duration-300 shadow-md">
                    Verify Access
                </button>
            </div>

            <form id="uploadStep" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Photo Title</label>
                    <input type="text" id="photoTitle" placeholder="e.g. Sunset in Paris" required class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Select Image</label>
                    <input type="file" id="photoFile" accept="image/jpeg, image/png, image/webp" required class="w-full text-sm text-gray-600 bg-gray-50 border border-gray-200 rounded-xl file:mr-4 file:py-3.5 file:px-4 file:rounded-l-xl file:border-0 file:text-sm file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300 cursor-pointer transition-all">
                </div>
                <button type="submit" id="submitUploadBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-semibold py-3.5 rounded-xl flex justify-center items-center gap-3 transition-colors shadow-md">
                    <span>Upload to Gallery</span>
                    <div id="uploadLoader" class="loader"></div>
                </button>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-50">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-green-400">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span id="toastMessage" class="font-medium text-sm">Action completed.</span>
    </div>

    <script type="module">
        // 1. Firebase Imports (Using uploadBytes instead of uploadBytesResumable to prevent hanging)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // 2. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAfAja0ei17_lcY9xxBlncLZdnR3umz6fA",
            authDomain: "avphotography-73dcc.firebaseapp.com",
            projectId: "avphotography-73dcc",
            storageBucket: "avphotography-73dcc.firebasestorage.app",
            messagingSenderId: "132715114211",
            appId: "1:132715114211:web:28079d13217cbfdcdb9fd6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Variables & DOM Elements
        const ADMIN_PASSWORD = "admin321";
        const gallery = document.getElementById('gallery');
        const emptyState = document.getElementById('emptyState');
        const modal = document.getElementById('passwordModal');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // --- Custom Toast Function ---
        function showToast(message) {
            toastMessage.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- Render Logic ---
        function renderGallery(photos) {
            gallery.innerHTML = '';
            if (photos.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            photos.forEach(photo => {
                const item = `
                    <div class="group overflow-hidden rounded-2xl bg-white shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100">
                        <div class="aspect-square overflow-hidden bg-gray-100 relative">
                            <img src="${photo.url}" alt="${photo.title}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out">
                            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300"></div>
                        </div>
                        <div class="p-5">
                            <h3 class="text-base font-bold text-gray-900 truncate">${photo.title}</h3>
                        </div>
                    </div>`;
                gallery.innerHTML += item;
            });
        }

        // --- Fetch Photos from Firebase ---
        async function fetchPhotos() {
            try {
                const q = query(collection(db, "photos"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                const photos = [];
                querySnapshot.forEach((doc) => photos.push(doc.data()));
                renderGallery(photos);
            } catch (error) {
                console.error("Error fetching photos:", error);
                emptyState.innerText = "Error loading gallery. Check console.";
                emptyState.style.display = 'block';
            }
        }

        fetchPhotos(); 

        // --- Modal & Password Logic ---
        document.getElementById('openUploadBtn').onclick = () => {
            modal.classList.add('active');
            document.getElementById('passwordStep').classList.remove('hidden');
            document.getElementById('uploadStep').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').focus();
        };
        
        document.getElementById('closeModalBtn').onclick = () => modal.classList.remove('active');
        
        document.getElementById('submitPasswordBtn').onclick = () => {
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                document.getElementById('passwordStep').classList.add('hidden');
                document.getElementById('uploadStep').classList.remove('hidden');
                document.getElementById('passwordError').classList.add('hidden');
            } else {
                document.getElementById('passwordError').classList.remove('hidden');
            }
        };

        // --- Convert to WebP Function ---
        function convertToWebP(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        canvas.toBlob((blob) => resolve(blob), 'image/webp', 0.85); 
                    };
                };
            });
        }

        // --- Upload Logic to Firebase ---
        document.getElementById('uploadStep').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('photoFile');
            const titleInput = document.getElementById('photoTitle');
            const btnText = document.querySelector('#submitUploadBtn span');
            const loader = document.getElementById('uploadLoader');
            const submitBtn = document.getElementById('submitUploadBtn');

            if (!fileInput.files[0]) return;

            // UI Loading State
            btnText.innerText = "Processing Image...";
            loader.style.display = "block";
            submitBtn.disabled = true;

            try {
                // 1. Convert to WebP
                const webpBlob = await convertToWebP(fileInput.files[0]);

                // 2. Prepare Storage
                const filename = `photo-${Date.now()}.webp`;
                const storageRef = ref(storage, 'uploads/' + filename);

                btnText.innerText = "Uploading securely...";

                // 3. Upload File (Using uploadBytes for reliability)
                const uploadTask = await uploadBytes(storageRef, webpBlob);
                const downloadURL = await getDownloadURL(uploadTask.ref);

                // 4. Save to Database
                await addDoc(collection(db, "photos"), {
                    title: titleInput.value,
                    url: downloadURL,
                    createdAt: serverTimestamp()
                });

                // 5. Success Flow
                showToast("Photo uploaded successfully!");
                modal.classList.remove('active');
                fetchPhotos(); 

            } catch (error) {
                console.error("Upload error:", error);
                alert("Upload failed. Ensure your Firebase Rules are set to 'allow read, write: if true;'");
            } finally {
                // Reset UI
                btnText.innerText = "Upload to Gallery";
                loader.style.display = "none";
                submitBtn.disabled = false;
                document.getElementById('uploadStep').reset();
            }
        });
    </script>
</body>

</html>
