<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVPhotography | Modern Photography Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #passwordModal {
            display: none;
        }

        #passwordModal.active {
            display: flex;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="bg-white sticky top-0 z-40 border-b border-gray-100 shadow-sm">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" class="text-3xl font-bold tracking-tighter text-gray-950">AVPhotography<span
                    class="text-indigo-600">.</span></a>
            <button id="openUploadBtn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-full text-sm flex items-center gap-2 transition">
                Upload Photo
            </button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 md:py-16">
        <div class="mb-12 border-b border-gray-100 pb-8">
            <h1 class="text-5xl font-extrabold tracking-tighter text-gray-950 md:text-6xl">Featured Works</h1>
        </div>
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>
    </main>

    <div id="passwordModal"
        class="fixed inset-0 z-50 overflow-y-auto bg-black/60 items-center justify-center p-6 backdrop-blur-sm transition">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold tracking-tight text-gray-950">Admin Access</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">X</button>
            </div>

            <div id="passwordStep" class="space-y-4">
                <input type="password" id="adminPassword" placeholder="Enter password"
                    class="w-full px-5 py-3.5 border border-gray-200 rounded-xl">
                <p id="passwordError" class="text-red-600 text-sm hidden">Incorrect password.</p>
                <button id="submitPasswordBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl">Verify</button>
            </div>

            <form id="uploadStep" class="space-y-4 hidden">
                <input type="text" id="photoTitle" placeholder="Photo Title" required
                    class="w-full px-5 py-3.5 border border-gray-200 rounded-xl">
                <input type="file" id="photoFile" accept="image/*" required
                    class="w-full text-sm text-gray-500 border border-gray-200 rounded-xl p-2">
                <button type="submit" id="submitUploadBtn"
                    class="w-full bg-indigo-600 text-white font-semibold py-3.5 rounded-xl flex justify-center items-center gap-2">
                    <span>Upload Image</span>
                    <div id="uploadLoader" class="loader"></div>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        // 1. Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // ====================================================================
        // 2. PASTE YOUR FIREBASE CONFIG HERE
        // ====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAfAja0ei17_lcY9xxBlncLZdnR3umz6fA",
            authDomain: "avphotography-73dcc.firebaseapp.com",
            projectId: "avphotography-73dcc",
            storageBucket: "avphotography-73dcc.firebasestorage.app",
            messagingSenderId: "132715114211",
            appId: "1:132715114211:web:28079d13217cbfdcdb9fd6"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // UI Variables
        const ADMIN_PASSWORD = "admin321";
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('passwordModal');

        // --- Render Logic ---
        function renderGallery(photos) {
            gallery.innerHTML = '';
            photos.forEach(photo => {
                const item = `
                    <div class="group overflow-hidden rounded-3xl bg-white shadow-md">
                        <div class="aspect-square overflow-hidden bg-gray-100">
                            <img src="${photo.url}" alt="${photo.title}" loading="lazy" class="w-full h-full object-cover">
                        </div>
                        <div class="p-6"><h3 class="text-lg font-semibold truncate">${photo.title}</h3></div>
                    </div>`;
                gallery.innerHTML += item;
            });
        }

        // --- Fetch Photos from Firebase ---
        async function fetchPhotos() {
            const q = query(collection(db, "photos"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            const photos = [];
            querySnapshot.forEach((doc) => {
                photos.push(doc.data());
            });
            renderGallery(photos);
        }

        fetchPhotos(); // Load on start

        // --- Modal & Password Logic ---
        document.getElementById('openUploadBtn').onclick = () => {
            modal.classList.add('active');
            document.getElementById('passwordStep').classList.remove('hidden');
            document.getElementById('uploadStep').classList.add('hidden');
        };
        document.getElementById('closeModalBtn').onclick = () => modal.classList.remove('active');
        document.getElementById('submitPasswordBtn').onclick = () => {
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                document.getElementById('passwordStep').classList.add('hidden');
                document.getElementById('uploadStep').classList.remove('hidden');
            } else {
                document.getElementById('passwordError').classList.remove('hidden');
            }
        };

        // --- BROWSER WEBP COMPRESSION FUNCTION ---
        // Converts standard images to WebP directly in the browser!
        function convertToWebP(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/webp', 0.8); // 0.8 is 80% quality
                    };
                };
            });
        }

        // --- Upload Logic to Firebase ---
        document.getElementById('uploadStep').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('photoFile');
            const titleInput = document.getElementById('photoTitle');
            const btnText = document.querySelector('#submitUploadBtn span');
            const loader = document.getElementById('uploadLoader');

            if (!fileInput.files[0]) return;

            // UI Loading State
            btnText.innerText = "Converting to WebP...";
            loader.style.display = "block";
            document.getElementById('submitUploadBtn').disabled = true;

            try {
                // 1. Convert to WebP in the browser
                const originalFile = fileInput.files[0];
                const webpBlob = await convertToWebP(originalFile);

                // 2. Prepare Firebase Storage upload
                const filename = `photo-${Date.now()}.webp`;
                const storageRef = ref(storage, 'uploads/' + filename);

                btnText.innerText = "Uploading to Firebase...";

                // 3. Upload to Firebase Storage
                const uploadTask = await uploadBytesResumable(storageRef, webpBlob);
                const downloadURL = await getDownloadURL(uploadTask.ref);

                // 4. Save metadata to Firestore Database
                await addDoc(collection(db, "photos"), {
                    title: titleInput.value,
                    url: downloadURL,
                    createdAt: serverTimestamp()
                });

                // 5. Success! Refresh gallery and close modal
                alert("Upload complete!");
                modal.classList.remove('active');
                fetchPhotos();

            } catch (error) {
                console.error("Upload failed", error);
                alert("Upload failed. Check console for details.");
            } finally {
                // Reset UI
                btnText.innerText = "Upload Image";
                loader.style.display = "none";
                document.getElementById('submitUploadBtn').disabled = false;
                document.getElementById('uploadStep').reset();
            }
        });
    </script>
</body>

</html>
